<html lang="ja">
<head>
<meta charset="UTF-8">

<title>2026年 国策俯瞰図｜就活生向け業界地図</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@600;700&display=swap');

  :root {
    --coral-light:#FAECE7;--coral-mid:#F0997B;--coral-dark:#993C1D;--coral-deep:#4A1B0C;
    --blue-light:#E6F1FB;--blue-mid:#85B7EB;--blue-dark:#185FA5;--blue-deep:#042C53;
    --teal-light:#E1F5EE;--teal-mid:#5DCAA5;--teal-dark:#0F6E56;--teal-deep:#04342C;
    --amber-light:#FAEEDA;--amber-mid:#EF9F27;--amber-dark:#854F0B;--amber-deep:#412402;
    --gray-bg:#F7F6F2;--gray-border:#E0DED6;--text-main:#1a1a18;--text-sub:#5a5a55;--text-hint:#9a9990;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--gray-bg);color:var(--text-main);line-height:1.6;padding-bottom:48px}

  /* HEADER */
  .site-header{background:#fff;border-bottom:2px solid var(--gray-border);padding:20px 24px 0;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  .site-header h1{font-family:'Outfit','Noto Sans JP',sans-serif;font-size:clamp(17px,3vw,24px);font-weight:700;color:var(--text-main)}
  .site-header p{font-size:clamp(10px,1.4vw,12px);color:var(--text-sub);margin-top:3px}
  .group-tabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px 16px 12px}
  .tab-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:none;cursor:pointer;transition:opacity .15s}
  .tab-pill:hover{opacity:.75}
  .tab-coral{background:var(--coral-mid);color:var(--coral-deep)}
  .tab-blue{background:var(--blue-mid);color:var(--blue-deep)}
  .tab-teal{background:var(--teal-mid);color:var(--teal-deep)}
  .tab-amber{background:var(--amber-mid);color:var(--amber-deep)}

  /* LAYOUT */
  .page-content{max-width:1280px;margin:0 auto;padding:20px 14px 0}
  .group-section{margin-bottom:28px}
  .group-header{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:7px;margin-bottom:12px}
  .group-header .g-num{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;opacity:.85}
  .group-header .g-title{font-size:clamp(14px,2vw,17px);font-weight:700}
  .group-header .g-en{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;opacity:.65;margin-left:auto}

  /* CARD GRID */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  @media(min-width:1024px){.card-grid{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:480px){.card-grid{grid-template-columns:1fr}.group-header .g-en{display:none}}

  /* CARD */
  .card{background:#fff;border-radius:10px;overflow:hidden;border:1.5px solid var(--gray-border);cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.10)}
  .card:focus{outline:2px solid #0070f3;outline-offset:2px}
  .card-header{padding:10px 13px 8px;border-bottom:1px solid rgba(0,0,0,.07)}
  .card-header .c-title{font-size:14px;font-weight:700;line-height:1.3}
  .card-header .c-sub{font-size:11px;margin-top:2px;opacity:.7}
  .card-body{padding:10px 13px 12px;flex:1;display:flex;flex-direction:column;gap:8px}
  .card-row-label{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;opacity:.72}
  .keywords{display:flex;flex-wrap:wrap;gap:4px}
  .kw-tag{font-size:10.5px;padding:2px 7px;border-radius:4px;font-weight:500;line-height:1.5}
  .industries{display:flex;flex-wrap:wrap;gap:4px}
  .ind-tag{font-size:10.5px;padding:2px 7px;border-radius:4px;font-weight:400;line-height:1.5;border:1px solid}
  .case-preview{font-size:11px;line-height:1.5;padding:6px 9px;border-radius:5px;border-left:3px solid;color:var(--text-sub)}
  .click-hint{font-size:10px;text-align:center;padding:6px 0 2px;opacity:.55;letter-spacing:.04em}

  /* COLOR THEMES */
  .g1 .group-header{background:var(--coral-light)}.g1 .group-header .g-num,.g1 .group-header .g-title,.g1 .group-header .g-en{color:var(--coral-deep)}
  .g1 .card{border-color:#F5C4B3}.g1 .card-header{background:var(--coral-mid)}.g1 .card-header .c-title{color:var(--coral-deep)}.g1 .card-header .c-sub{color:#712B13}
  .g1 .card-row-label{color:var(--coral-dark)}.g1 .kw-tag{background:#FAD5C6;color:var(--coral-dark)}.g1 .ind-tag{border-color:var(--coral-mid);color:var(--coral-dark)}
  .g1 .case-preview{background:var(--coral-light);border-left-color:var(--coral-mid)}
  .g2 .group-header{background:var(--blue-light)}.g2 .group-header .g-num,.g2 .group-header .g-title,.g2 .group-header .g-en{color:var(--blue-deep)}
  .g2 .card{border-color:#B5D4F4}.g2 .card-header{background:var(--blue-mid)}.g2 .card-header .c-title{color:var(--blue-deep)}.g2 .card-header .c-sub{color:#0C447C}
  .g2 .card-row-label{color:var(--blue-dark)}.g2 .kw-tag{background:#C8DFF7;color:var(--blue-dark)}.g2 .ind-tag{border-color:var(--blue-mid);color:var(--blue-dark)}
  .g2 .case-preview{background:var(--blue-light);border-left-color:var(--blue-mid)}
  .g3 .group-header{background:var(--teal-light)}.g3 .group-header .g-num,.g3 .group-header .g-title,.g3 .group-header .g-en{color:var(--teal-deep)}
  .g3 .card{border-color:#9FE1CB}.g3 .card-header{background:var(--teal-mid)}.g3 .card-header .c-title{color:var(--teal-deep)}.g3 .card-header .c-sub{color:#085041}
  .g3 .card-row-label{color:var(--teal-dark)}.g3 .kw-tag{background:#B8EDD9;color:var(--teal-dark)}.g3 .ind-tag{border-color:var(--teal-mid);color:var(--teal-dark)}
  .g3 .case-preview{background:var(--teal-light);border-left-color:var(--teal-mid)}
  .g4 .group-header{background:var(--amber-light)}.g4 .group-header .g-num,.g4 .group-header .g-title,.g4 .group-header .g-en{color:var(--amber-deep)}
  .g4 .card{border-color:#FAC775}.g4 .card-header{background:var(--amber-mid)}.g4 .card-header .c-title{color:var(--amber-deep)}.g4 .card-header .c-sub{color:#633806}
  .g4 .card-row-label{color:var(--amber-dark)}.g4 .kw-tag{background:#FAD99A;color:var(--amber-dark)}.g4 .ind-tag{border-color:var(--amber-mid);color:var(--amber-dark)}
  .g4 .case-preview{background:var(--amber-light);border-left-color:var(--amber-mid)}

  /* ── MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.active{opacity:1;pointer-events:all}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.22);transform:translateY(12px);transition:transform .22s;position:relative}
  .modal-overlay.active .modal{transform:translateY(0)}
  .modal-top{padding:16px 18px 12px;border-bottom:1px solid var(--gray-border);position:sticky;top:0;background:#fff;z-index:10;border-radius:14px 14px 0 0}
  .modal-top .m-tag{font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:12px;display:inline-block;margin-bottom:6px}
  .modal-top h2{font-size:18px;font-weight:700;line-height:1.3}
  .modal-top .m-sub{font-size:12px;color:var(--text-sub);margin-top:2px}
  .modal-close{position:absolute;top:12px;right:14px;font-size:20px;background:none;border:none;cursor:pointer;color:var(--text-hint);line-height:1;padding:2px 4px;border-radius:4px}
  .modal-close:hover{color:var(--text-main);background:var(--gray-bg)}
  .modal-body{padding:16px 18px 20px;display:flex;flex-direction:column;gap:16px}
  .modal-section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;opacity:.65}
  .modal-desc{font-size:14px;line-height:1.8;color:var(--text-main);padding:10px 14px;border-radius:8px;border-left:3px solid}
  .modal-kw-wrap{display:flex;flex-wrap:wrap;gap:6px}
  .modal-kw{font-size:12px;font-weight:500;padding:3px 10px;border-radius:5px;line-height:1.5}
  .modal-ind-wrap{display:flex;flex-wrap:wrap;gap:6px}
  .modal-ind{font-size:12px;padding:3px 10px;border-radius:5px;line-height:1.5;border:1px solid}
  .modal-examples ol{padding-left:20px;display:flex;flex-direction:column;gap:8px}
  .modal-examples li{font-size:13px;line-height:1.75;color:var(--text-main)}
  .modal-examples li::marker{font-weight:700;font-size:13px}

  /* Modal color theming via data attribute */
  [data-group="1"] .m-tag{background:var(--coral-mid);color:var(--coral-deep)}
  [data-group="1"] .modal-desc{background:var(--coral-light);border-color:var(--coral-mid)}
  [data-group="1"] .modal-kw{background:#FAD5C6;color:var(--coral-dark)}
  [data-group="1"] .modal-ind{border-color:var(--coral-mid);color:var(--coral-dark)}
  [data-group="1"] .modal-section-label{color:var(--coral-dark)}
  [data-group="1"] .modal-examples li::marker{color:var(--coral-dark)}
  [data-group="2"] .m-tag{background:var(--blue-mid);color:var(--blue-deep)}
  [data-group="2"] .modal-desc{background:var(--blue-light);border-color:var(--blue-mid)}
  [data-group="2"] .modal-kw{background:#C8DFF7;color:var(--blue-dark)}
  [data-group="2"] .modal-ind{border-color:var(--blue-mid);color:var(--blue-dark)}
  [data-group="2"] .modal-section-label{color:var(--blue-dark)}
  [data-group="2"] .modal-examples li::marker{color:var(--blue-dark)}
  [data-group="3"] .m-tag{background:var(--teal-mid);color:var(--teal-deep)}
  [data-group="3"] .modal-desc{background:var(--teal-light);border-color:var(--teal-mid)}
  [data-group="3"] .modal-kw{background:#B8EDD9;color:var(--teal-dark)}
  [data-group="3"] .modal-ind{border-color:var(--teal-mid);color:var(--teal-dark)}
  [data-group="3"] .modal-section-label{color:var(--teal-dark)}
  [data-group="3"] .modal-examples li::marker{color:var(--teal-dark)}
  [data-group="4"] .m-tag{background:var(--amber-mid);color:var(--amber-deep)}
  [data-group="4"] .modal-desc{background:var(--amber-light);border-color:var(--amber-mid)}
  [data-group="4"] .modal-kw{background:#FAD99A;color:var(--amber-dark)}
  [data-group="4"] .modal-ind{border-color:var(--amber-mid);color:var(--amber-dark)}
  [data-group="4"] .modal-section-label{color:var(--amber-dark)}
  [data-group="4"] .modal-examples li::marker{color:var(--amber-dark)}

  .site-footer{text-align:center;font-size:11px;color:var(--text-hint);padding:24px 16px 0;border-top:1px solid var(--gray-border);max-width:1280px;margin:28px auto 0}
  @media print{.site-header{position:static;box-shadow:none}.group-tabs,.modal-overlay,.click-hint{display:none}.card:hover{transform:none;box-shadow:none}body{background:#fff}}
</style>
</head>

      <span class="g-title">${group.gTitle.slice(1)}</span>
      <span class="g-en">${group.gEn}</span>
    </div>
    <div class="card-grid" id="grid${group.id}"></div>`;
  main.appendChild(sec);

  const grid = sec.querySelector(`#grid${group.id}`);
  group.themes.forEach(theme => {
    const card = document.createElement('article');
    card.className = 'card';
    card.tabIndex = 0;
    card.setAttribute('role','button');
    card.setAttribute('aria-label', theme.name + 'の詳細を見る');
    card.innerHTML = `
      <div class="card-header">
        <div class="c-title">${theme.name}</div>
        <div class="c-sub">${theme.sub}</div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-row-label">🔑 キーワード</div>
          <div class="keywords">${theme.keywords.map(k=>`<span class="kw-tag">${k}</span>`).join('')}</div>
        </div>
        <div>
          <div class="card-row-label">🏭 関連業界</div>
          <div class="industries">${theme.industry.map(i=>`<span class="ind-tag">${i}</span>`).join('')}</div>
        </div>
        <div class="case-preview">${theme.examples[0]}</div>
        <div class="click-hint">タップして事例・解説を見る ▸</div>
      </div>`;

    card.addEventListener('click', () => openModal(group.id, theme));
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') openModal(group.id, theme); });
    grid.appendChild(card);
  });
});

// Modal logic
const overlay = document.getElementById('modal');
const modalBox = document.getElementById('modal-box');

function openModal(gid, theme) {
  modalBox.setAttribute('data-group', gid);
  document.getElementById('modal-tag').textContent = DATA.find(g=>g.id===gid).gTitle;
  document.getElementById('modal-title').textContent = theme.name;
  document.getElementById('modal-sub').textContent = theme.sub;
  document.getElementById('modal-desc').textContent = theme.desc;
  document.getElementById('modal-kw').innerHTML = theme.keywords.map(k=>`<span class="modal-kw">${k}</span>`).join('');
  document.getElementById('modal-ind').innerHTML = theme.industry.map(i=>`<span class="modal-ind">${i}</span>`).join('');
  document.getElementById('modal-examples').innerHTML = theme.examples.map(e=>`<li>${e}</li>`).join('');
  overlay.classList.add('active');
  document.body.style.overflow='hidden';
  document.getElementById('modal-close').focus();
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow='';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
